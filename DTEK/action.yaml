name: Проверить свет (Ручной запуск)

on:
  workflow_dispatch: # Это включает кнопку "Run workflow"

jobs:
  check_light:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код репозитория
        uses: actions/checkout@v3

      - name: Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Устанавливаем библиотеки
        run: pip install pyTelegramBotAPI requests

      - name: Запускаем бота
        run: python bot.py